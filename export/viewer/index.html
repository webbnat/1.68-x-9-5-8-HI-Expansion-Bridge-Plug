<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHEX-BP-UHEX-54 — 3D Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a1e; color: #e8e8ec; overflow: hidden; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    #panel {
      position: fixed; top: 12px; left: 12px; width: 320px;
      background: rgba(24,24,28,0.92); border: 1px solid #444; border-radius: 8px;
      padding: 14px; font-size: 13px; line-height: 1.5;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    label { display: block; margin: 10px 0 4px; color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    select, button {
      width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555;
      background: #2a2a30; color: #eee; font-size: 13px; cursor: pointer;
    }
    button { margin-top: 8px; }
    button:hover, select:hover { border-color: #7aa2f7; }
    #info { margin-top: 12px; color: #999; font-size: 12px; }
    #legend { margin-top: 10px; }
    .tag { display: inline-block; background: #333; padding: 2px 6px; border-radius: 3px; margin: 2px 2px 0 0; font-size: 11px; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="panel">
    <h1>SHEX-BP-UHEX-54 Plug Viewer</h1>
    <label>Model</label>
    <select id="modelSelect">
      <option value="set">Set condition (expanded)</option>
      <option value="run_in">Run-in (collapsed 1.688" OD)</option>
      <option value="set_casing">Set + 9-5/8" casing reference</option>
      <option value="setting_tool">Setting tool SHEX-ST-54</option>
      <option value="combined">Combined run-in string</option>
    </select>
    <button id="resetBtn">Reset camera</button>
    <div id="info">
      <p>Drag to orbit · Scroll to zoom · Right-drag to pan</p>
      <div id="legend">
        <span class="tag">Z=0 mandrel tail</span>
        <span class="tag">Z=54 fishing neck</span>
        <span class="tag">Units: inches (STL mm)</span>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    const FILES = {
      set: '../../output/stl/shex_54/40_plug_uhex_54in_assembly_set.stl',
      run_in: '../../output/stl/shex_54/40_plug_uhex_54in_assembly_run_in.stl',
      set_casing: '../../output/stl/shex_54/40_plug_uhex_54in_set_with_casing.stl',
      setting_tool: '../../output/stl/shex_54/41_setting_tool_shex_st54.stl',
      combined: '../../output/stl/shex_54/42_combined_string_lube_check.stl',
    };

    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x1a1a1e);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 50000);
    camera.position.set(800, 400, 1200);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const key = new THREE.DirectionalLight(0xffffff, 0.85);
    key.position.set(500, 800, 600);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x8899bb, 0.35);
    fill.position.set(-400, 200, -300);
    scene.add(fill);

    const grid = new THREE.GridHelper(3000, 30, 0x333344, 0x222230);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);

    const axisLen = 200;
    const axes = new THREE.Group();
    [[axisLen,0,0,0xff4444], [0,axisLen,0,0x44ff44], [0,0,axisLen,0x4488ff]].forEach(([x,y,z,col]) => {
      const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(x,y,z)]);
      axes.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color: col })));
    });
    scene.add(axes);

    let meshGroup = new THREE.Group();
    scene.add(meshGroup);
    const loader = new STLLoader();
    let defaultCam = { pos: camera.position.clone(), target: new THREE.Vector3() };

    function colorFor(key) {
      const colors = {
        set: 0x7aa2f7,
        run_in: 0x9ece6a,
        set_casing: 0x7aa2f7,
        setting_tool: 0xe0af68,
        combined: 0xbb9af7,
      };
      return colors[key] || 0xaaaaaa;
    }

    async function loadModel(key) {
      meshGroup.clear();
      const url = FILES[key];
      const geometry = await loader.loadAsync(url);
      geometry.computeBoundingBox();
      geometry.computeVertexNormals();
      const bb = geometry.boundingBox;
      const center = new THREE.Vector3();
      bb.getCenter(center);
      geometry.translate(-center.x, -center.y, -center.z);

      const mat = new THREE.MeshStandardMaterial({
        color: colorFor(key),
        metalness: key === 'setting_tool' ? 0.55 : 0.35,
        roughness: 0.45,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geometry, mat);
      meshGroup.add(mesh);

      if (key === 'set_casing') {
        const casingMat = new THREE.MeshStandardMaterial({
          color: 0x555566, metalness: 0.2, roughness: 0.7,
          transparent: true, opacity: 0.25, side: THREE.DoubleSide,
        });
        // casing is merged in STL — whole mesh gets plug color; acceptable for review
      }

      const size = new THREE.Vector3();
      bb.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim * 1.8;
      defaultCam.pos.set(dist * 0.6, dist * 0.35, dist);
      defaultCam.target.set(0, size.z * 0.15, 0);
      camera.position.copy(defaultCam.pos);
      controls.target.copy(defaultCam.target);
      controls.update();
    }

    document.getElementById('modelSelect').addEventListener('change', (e) => loadModel(e.target.value));
    document.getElementById('resetBtn').addEventListener('click', () => {
      camera.position.copy(defaultCam.pos);
      controls.target.copy(defaultCam.target);
      controls.update();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    loadModel('set').then(animate);
  </script>
</body>
</html>
